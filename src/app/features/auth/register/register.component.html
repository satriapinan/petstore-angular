<div class="register-container">
  <app-card minWidth="30vw" [customStyle]="cardStyle">
    <div class="content-container">
      <p class="register-subtitle">Create your account</p>
      <h2 class="register-title">Get Started!</h2>
    </div>

    <form class="form-container" (ngSubmit)="submit()">
      <div class="content-container">
        <app-textfield label="Username" [(ngModel)]="username" name="username"></app-textfield>
        <app-textfield
          label="Password"
          type="password"
          [(ngModel)]="password"
          name="password"
        ></app-textfield>
        <app-textfield
          label="Confirm Password"
          type="password"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
        ></app-textfield>
        @if (passwordMismatch) {
          <p class="error">Passwords do not match</p>
        }
        @if (error()) {
          <p class="error">{{ error() }}</p>
        }
      </div>

      <app-button
        label="Sign Up"
        type="submit"
        variant="contained"
        [fullWidth]="true"
        [loading]="loading()"
        [disabled]="isFormInvalid"
        fontSize="16px"
        fontWeight="500"
        padding="14px 20px"
      ></app-button>
    </form>
    <p class="login-link">Already have an account? <a routerLink="/login">Sign in</a></p>
  </app-card>
</div>

<div class="textfield">
  <label class="label" [for]="inputId">
    {{ label() }}
  </label>

  <input
    class="input"
    [id]="inputId"
    [type]="type()"
    [value]="value"
    [placeholder]="placeholder()"
    [disabled]="disabled"
    (input)="onInput($event)"
    (blur)="onBlur()"
  />
</div>
